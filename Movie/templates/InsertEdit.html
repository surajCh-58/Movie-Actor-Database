<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if instance.pk %}Update Movie{% else %}Create New Movie{% endif %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card p-4 shadow-sm border-0">
                    <h2 class="mb-4 text-center">
                        {% if instance.pk %}Update Movie{% else %}Add New Movie{% endif %}
                    </h2>
                    
                    <form method="POST">
                        {% csrf_token %}
                    
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            
                            {{ field }}
                            
                            {% if field.errors %}
                                <div class="text-danger small mt-1">
                                    {{ field.errors|join:", " }}
                                </div>
                            {% endif %}
                        </div>
                        {% endfor %}
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                {% if instance.pk %}Update Movie{% else %}Save Movie{% endif %}
                            </button>
                        </div>
                        
                        <div class="text-center mt-3">
                            <a href="{% url 'allmovies' %}" class="text-decoration-none">Back to list</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
